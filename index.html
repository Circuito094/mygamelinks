<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Game Links</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #333;
      color: white;
      padding: 20px;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 2em;
    }
    main {
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    .game {
      background-color: white;
      margin: 10px 0;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      transition: transform 0.2s;
    }
    .game:hover {
      transform: scale(1.02);
    }
    .game img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 10px;
      margin-right: 15px;
    }
    .game a {
      text-decoration: none;
      color: #333;
      font-size: 1.2em;
    }
    footer {
      text-align: center;
      padding: 15px;
      background-color: #333;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>My Game Links</h1>
  </header>

  <main>
    <div class="game">
      <img src="https://via.placeholder.com/60" alt="Game 1">
      <a href="https://examplegame1.com" target="_blank">Game 1</a>
    </div>
    <div class="game">
      <img src="https://via.placeholder.com/60" alt="Game 2">
      <a href="https://examplegame2.com" target="_blank">Game 2</a>
    </div>
    <div class="game">
      <img src="https://via.placeholder.com/60" alt="Game 3">
      <a href="https://examplegame3.com" target="_blank">Game 3</a>
    </div>
  </main>

  <footer>
    © 2026 My Game Links
  </footer>
</body>
</html>
