<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Game Portal</title>
  <style>
    /* Background & fonts */
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4, #fbc2eb);
      min-height: 100vh;
      color: #333;
    }

    /* Header */
    header {
      background-color: rgba(0,0,0,0.7);
      color: white;
      padding: 30px;
      text-align: center;
      box-shadow: 0 5px 10px rgba(0,0,0,0.3);
    }
    header h1 {
      margin: 0;
      font-size: 2.5em;
      text-shadow: 2px 2px #000;
    }

    /* Main container */
    main {
      max-width: 1000px;
      margin: auto;
      padding: 30px 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    /* Game card */
    .game {
      background-color: rgba(255,255,255,0.9);
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .game:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.4);
    }

    .game img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .game a {
      display: block;
      font-size: 1.3em;
      text-decoration: none;
      color: #ff0055;
      font-weight: bold;
      transition: color 0.2s;
    }
    .game a:hover {
      color: #ffbb33;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 15px;
      background-color: rgba(0,0,0,0.7);
      color: white;
      margin-top: 30px;
      font-size: 0.9em;
    }

    @media(max-width: 500px){
      .game img {
        width: 100px;
        height: 100px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>My Game Portal</h1>
  </header>

  <main>
    <!-- 1v1.lol -->
    <div class="game">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/33/1v1.lol_logo.png" alt="1v1.lol">
      <a href="https://1v1.lol/" target="_blank">1v1.lol</a>
    </div>

    <!-- Slither.io -->
    <div class="game">
      <img src="https://upload.wikimedia.org/wikipedia/en/9/9e/Slither.io_logo.png" alt="Slither.io">
      <a href="https://slither.io/" target="_blank">Slither.io</a>
    </div>

    <!-- Agar.io -->
    <div class="game">
      <img src="https://upload.wikimedia.org/wikipedia/en/8/83/Agar.io_logo.png" alt="Agar.io">
      <a href="https://agar.io/" target="_blank">Agar.io</a>
    </div>

    <!-- Minecraft Demo -->
    <div class="game">
      <img src="https://upload.wikimedia.org/wikipedia/en/7/79/Minecraft_logo.png" alt="Minecraft">
      <a href="https://www.minecraft.net/en-us/play" target="_blank">Minecraft Demo</a>
    </div>

    <!-- CrazyGames Example -->
    <div class="game">
      <img src="https://static.crazygames.com/icons/favicon-96x96.png" alt="CrazyGames">
      <a href="https://www.crazygames.com/" target="_blank">CrazyGames</a>
    </div>
  </main>

  <footer>
    © 2026 My Game Portal | All links open in a new tab
  </footer>
</body>
</html>
